spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/applicantData
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true
        open-in-view: false
    flyway:
        enabled: true

logging:
    level:
        org:
            hibernate:
                SQL: info
    
    